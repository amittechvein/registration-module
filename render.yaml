databases:
  - name: registration-db
    plan: free
    databaseName: registration
    user: registration

services:
  - type: web
    name: registration-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: registration-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: DEV_SHOW_OTP
        value: "true"
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
